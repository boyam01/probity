<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="system-ui,Segoe UI,sans-serif">
  <rect width="760" height="520" fill="#ffffff"/>

  <!-- title -->
  <text x="44" y="40" font-size="18" font-weight="600" fill="#2C2C2A">Where LLM-agent evaluation is heading</text>
  <text x="44" y="62" font-size="12" fill="#5F5E5A">The field is moving toward verdicts that are deterministic and independently verifiable — and that catch dishonesty, not only correctness.</text>

  <!-- axes -->
  <line x1="130" y1="452" x2="722" y2="452" stroke="#B7B5AF" stroke-width="1.2"/>
  <line x1="130" y1="452" x2="130" y2="108" stroke="#B7B5AF" stroke-width="1.2"/>
  <text x="426" y="492" font-size="11.5" fill="#5F5E5A" text-anchor="middle">deterministic &amp; independently verifiable verdict  →</text>
  <text x="66" y="288" font-size="11.5" fill="#5F5E5A" text-anchor="middle" transform="rotate(-90 66 288)">catches integrity failure — lying / cheating  →</text>
  <text x="134" y="470" font-size="9.5" fill="#A8A6A0">low</text>
  <text x="704" y="470" font-size="9.5" fill="#A8A6A0">high</text>
  <text x="112" y="116" font-size="9.5" fill="#A8A6A0" text-anchor="middle">high</text>

  <!-- trend arrow (behind the points) -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 z" fill="#9A91E0"/>
    </marker>
  </defs>
  <line x1="215" y1="418" x2="566" y2="196" stroke="#C9C3F2" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#ah)"/>
  <text x="300" y="358" font-size="10.5" fill="#7A6FD0" transform="rotate(-32 300 358)">direction of the field</text>

  <!-- single-run demo (bottom-left) -->
  <circle cx="178" cy="406" r="6.5" fill="#9C9A93"/>
  <text x="178" y="426" font-size="11" fill="#3A3A37" text-anchor="middle">single-run demo</text>
  <text x="178" y="439" font-size="9" fill="#A8A6A0" text-anchor="middle">&quot;it worked once&quot;</text>

  <!-- static benchmark (label above the dot) -->
  <circle cx="322" cy="416" r="6.5" fill="#9C9A93"/>
  <text x="322" y="400" font-size="11" fill="#3A3A37" text-anchor="middle">static benchmark score</text>
  <text x="322" y="387" font-size="9" fill="#A8A6A0" text-anchor="middle">one number, gameable</text>

  <!-- LLM-as-a-judge (label to the right) -->
  <circle cx="208" cy="250" r="6.5" fill="#D85A30"/>
  <text x="224" y="247" font-size="11" fill="#3A3A37">LLM-as-a-judge</text>
  <text x="224" y="261" font-size="9" fill="#9E3F20">biased; AUROC ≈ 0.56</text>

  <!-- black-box UQ (label above the dot) -->
  <circle cx="430" cy="336" r="6.5" fill="#9C9A93"/>
  <text x="430" y="320" font-size="11" fill="#3A3A37" text-anchor="middle">black-box UQ / semantic entropy</text>
  <text x="430" y="307" font-size="9" fill="#A8A6A0" text-anchor="middle">no oracle; fuzzy, needs an NLI model</text>

  <!-- Probity (top-right, highlighted) -->
  <rect x="566" y="120" width="158" height="68" rx="11" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.6"/>
  <circle cx="592" cy="150" r="7" fill="#1D9E75"/>
  <text x="608" y="154" font-size="13" font-weight="600" fill="#0F6E56">Probity</text>
  <text x="586" y="172" font-size="9" fill="#0F6E56">k-runs · Wilson CI · zero-LLM verdict</text>
  <text x="586" y="184" font-size="9" fill="#0F6E56">integrity flags · falsification-first</text>

  <!-- caption -->
  <text x="44" y="510" font-size="9.5" fill="#A8A6A0">Positioning, not a benchmark. Probity trades generality (it needs a deterministic checker) for a verdict you can independently verify — and that catches lying.</text>
</svg>
